<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Imposter Fullskärm</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100vw;  /* 100% av viewport-bredden */
      height: 100vh; /* 100% av viewport-höjden */
      border: none;
      position: fixed;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <iframe 
    src="https://play.gameonfamily.com/imposter/" 
    allowfullscreen
  ></iframe>
</body>
</html>
